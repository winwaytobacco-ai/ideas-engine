name: Daily engine run

on:
  schedule:
    # 21:30 UTC ≈ 5:30pm ET — after US market close, every day
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the engine (one retry — Yahoo sometimes rate-limits cloud IPs)
        run: python main.py || (echo "First attempt failed; retrying in 5 min…" && sleep 300 && python main.py)

      - name: Commit fresh output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Daily run $(date -u +%F)"
          git pull --rebase origin main
          git push

      # GITHUB_TOKEN pushes don't trigger pages.yml, so deploy directly here.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output
      - id: deployment
        uses: actions/deploy-pages@v4
